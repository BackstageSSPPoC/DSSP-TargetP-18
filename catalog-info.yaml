apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name:  DSSP-TargetP-18
  description: Service  DSSP-TargetP-18

  annotations:
    github.com/project-slug: BackstageSSPPoC/ DSSP-TargetP-18
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: Backstage_SSP_PoC/DSSP-TargetP-18/main
    argocd/app-name:  dssp-targetp-18-dev
    backstage.io/kubernetes-id:  DSSP-TargetP-18
    sonarqube.org/project-key:  dssp-targetp-18
    prometheus.io/rule: "kube_pod_container_resource_requests{pod=~'dssp-targetp-18.*'}|resource,kube_pod_container_status_restarts_total{pod=~'dssp-targetp-18.*'}|container"
    prometheus.io/alert: "KubePodCrashLooping,KubeDeploymentReplicasMismatch,KubePodNotReady,KubeContainerWaiting,KubeContainerOOMKilled,KubeDeploymentRolloutStuck"
    prometheus.io/labels: "namespace=dev

spec:
  type: service
  owner: development
  lifecycle: experimental

